name: Build iOS App

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

env:
  PROJECT_NAME: SmartGlassesVision
  XCODE_VERSION: "16.2"

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode${{ env.XCODE_VERSION }}.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Install CocoaPods
        run: |
          gem install cocoapods
          pod repo update --silent

      - name: Generate Project
        run: xcodegen generate

      - name: Install Pods
        run: pod install

      - name: Build App
        run: |
          xcodebuild \
  -workspace ${{ env.PROJECT_NAME }}.xcworkspace \
  -scheme ${{ env.PROJECT_NAME }} \
  -sdk iphoneos \
  -configuration Debug \
  -allowProvisioningUpdates \
  -archivePath /tmp/archive.xcarchive \
  archive

      - name: Export IPA
        if: success()
        run: |
          xcodebuild \
  -exportArchive \
  -archivePath /tmp/archive.xcarchive \
  -exportPath /tmp/export \
  -exportOptionsPlist .github/export-options.plist \
  -allowProvisioningUpdates

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SmartGlassesVision${{ github.sha }}
          path: /tmp/export/*.ipa


